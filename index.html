<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>居家倉儲紀錄系統</title>
	
    <script src="https://cdn.tailwindcss.com"></script>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
	
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        /* 隱藏 details 的預設標記 (針對 Safari/Chrome) */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
	
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 font-sans">
    
    <!-- 側邊欄遮罩 (手機版) -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-30 hidden min-[840px]:hidden"></div>

    <div class="flex h-screen overflow-hidden">

        <!-- 左側導覽列 -->
        <aside id="sidebar" class="w-64 bg-slate-800 border-r border-slate-700 flex-shrink-0 flex flex-col fixed inset-y-0 left-0 z-40 transform -translate-x-full min-[840px]:relative min-[840px]:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="px-3 py-3">
                <h1 class="text-xl font-bold text-blue-400 mb-4">
				<a href="https://dennychu2004.github.io/HomeStorage/" class="text-inherit no-underline hover:no-underline cursor-pointer">
				🏠 朱家倉儲
				</a>
				</h1>
                
                <div class="mb-5">
                    <label class="text-xs text-slate-500 mb-2 block">切換住家</label>
                    <select id="homeSelect" onchange="switchHome()" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 text-slate-200">
                        <option value="高雄家">高雄家</option>
                        <option value="台南宿舍">台南宿舍</option>
                    </select>
                </div>
            </div>
            
            <nav class="flex-1 overflow-y-auto px-3 space-y-6">
                <div>
                    <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">位置導覽</h3>
                    <ul class="space-y-2" id="sidebarLocationNav">
                        <!-- 由 JavaScript 動態生成位置導覽 -->
                    </ul>
                </div>

                <div>
                    <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">系統設定</h3>
                    <button onclick="openManageRoomsModal()" class="w-full text-left block px-3 py-0.5 rounded-lg hover:bg-slate-700 transition mb-1 text-slate-300 text-sm">🏢 自訂樓層房間</button>
                    <button onclick="openManageLocationsModal()" class="w-full text-left block px-3 py-0.5 rounded-lg hover:bg-slate-700 transition mb-1 text-slate-300 text-sm">📌 自訂存放位置</button>
                    <button onclick="openManageBoxesModal()" class="w-full text-left block px-3 py-0.5 rounded-lg hover:bg-slate-700 transition mb-1 text-slate-300 text-sm">📦 自訂容器項目</button>
                    <button onclick="openManageCategoriesModal()" class="w-full text-left block px-3 py-0.5 rounded-lg hover:bg-slate-700 transition text-slate-300 text-sm">🏷️ 自訂物品類別</button>
                </div>
            </nav>
        </aside>

        <!-- 右側主內容 -->
        <main class="flex-1 overflow-y-auto flex flex-col">
            <!-- 頂部導覽列 -->
            <header class="bg-slate-800/50 backdrop-blur-md sticky top-0 z-10 border-b border-slate-700">
                <div class="px-4 min-[840px]:px-8 pt-3 pb-2 flex justify-between items-center">
                    <div class="flex items-center">
                        <button onclick="toggleSidebar()" class="min-[840px]:hidden mr-3 text-slate-300 hover:text-white focus:outline-none">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                            </svg>
                        </button>
                        <div id="currentHomeDisplay" class="text-lg font-medium text-slate-200">
                            目前住家：高雄家
                        </div>
                    </div>
                    <div id="clock" class="text-sm text-slate-400 font-mono hidden sm:block"></div>
                </div>
            </header>

            <div class="p-3 flex-1">
                <!-- 狀態摘要 -->
                <section class="grid grid-cols-1 min-[840px]:grid-cols-3 gap-3 mb-4">
                    <div class="bg-slate-800 py-2 px-5 rounded-2xl border border-slate-700 shadow-lg flex flex-col justify-center">
						<p class="text-slate-400 text-sm">總庫存品項</p>
                        <div class="flex justify-between items-start items-center">
							<h2 id="totalItemsDisplay" class="text-3xl font-bold mt-1 text-blue-400">0 <span class="text-base font-normal text-slate-300">件</span></h2>
                            <button class="text-slate-500 cursor-not-allowed transition" title="相關資訊 (保留)">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            </button>
                        </div>
                    </div>
                    <div class="bg-slate-800 py-2 px-5 rounded-2xl border border-slate-700 shadow-lg flex flex-col justify-center">
						<p class="text-slate-400 text-sm">即將到期 (10天內)</p>
                        <div class="flex justify-between items-start items-center">
							<h2 id="expiringDisplay" class="text-3xl font-bold text-orange-400 mt-1">0 <span class="text-base font-normal text-slate-300">件</span></h2>	
                            <button onclick="showExpiringItems()" class="text-slate-500 hover:text-orange-400 transition" title="檢視即將到期清單">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            </button>
                        </div>
                    </div>
                    <div class="bg-slate-800 py-2 px-5 rounded-2xl border border-slate-700 shadow-lg flex flex-col justify-center">
						<p class="text-slate-400 text-sm">已過期</p>
                        <div class="flex justify-between items-start items-center">
							<h2 id="lowStockDisplay" class="text-3xl font-bold text-red-400 mt-1">0 <span class="text-base font-normal text-slate-300">件</span></h2>
                            <button onclick="showExpiredItems()" class="text-slate-500 hover:text-red-400 transition" title="檢視已過期清單">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            </button>
						</div>
					</div>
                </section>

                <!-- 搜尋與類別篩選 -->
                <section class="flex flex-col min-[840px]:flex-row gap-3 mb-4">
                    <div class="flex-1 relative">
                        <input id="searchInput" type="text" oninput="triggerFilter()" placeholder="搜尋物品名稱..." 
                            class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 text-slate-100 placeholder-slate-500">
                    </div>
                    <select id="categoryFilter" onchange="triggerFilter()" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none text-slate-200">
                        <option value="all">所有類別</option>
                        <!-- 動態載入類別 -->
                    </select>
                </section>

                <!-- 庫存明細列表 -->
                <section class="bg-slate-800 px-3 py-2 rounded-2xl border border-slate-700 shadow-lg">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-bold flex items-center">
                            <span id="activeFilterBadge" class="px-2.5 py-1 rounded-lg text-sm font-semibold bg-blue-900/50 text-white hidden"></span>
                        </h3>
                        <div class="flex gap-2">
                            <button onclick="openBatchAddItemModal()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-2.5 py-1 rounded-lg transition text-sm font-semibold shadow-md shadow-emerald-900/30">🗂️ 批量</button>
                            <button onclick="openAddEditItemModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-2.5 py-1 rounded-lg transition text-sm font-semibold shadow-md shadow-blue-900/30">🔖 新增</button>
								
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-slate-400 border-b border-slate-700">
                                <tr>
                                    <th class=" pb-2 font-normal text-sm">名稱</th>
                                    <th class="w-[clamp(10px,8vw,220px)]  px-0 pb-2 font-normal text-sm">類別</th>
                                    <th class="w-[clamp(10px,16VW,220px)] px-0 pb-2 font-normal text-sm">位置</th>
                                    <th class="w-[clamp(10px,8vw,220px)]  px-0 pb-2 font-normal text-sm">容器</th>
                                    <th class="w-[clamp(10px,8vw,140px)]  px-0 pb-2 font-normal text-sm">數量</th>
                                    <th class="w-[clamp(10px,8vw,140px)]  px-0 pb-2 font-normal text-sm">日期</th>
									<th class="w-[clamp(10px,8vw,90px)]   px-0 pb-2 font-normal text-sm text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryTableBody" class="divide-y divide-slate-700">
                                <!-- 庫存數據將動態渲染 -->
                            </tbody>
                        </table>
                        <div id="emptyState" class="py-12 text-center text-slate-500 hidden">
                            無符合當前篩選條件的物品。
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- ==================== 浮動視窗 (Modal) 系統 ==================== -->
    <div id="modalOverlay" class="fixed inset-0 z-50 bg-black/75 flex items-center justify-center p-3 hidden">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl max-w-lg w-full overflow-hidden shadow-2xl transition-all scale-95 transform-gpu max-h-[84vh] flex flex-col" id="modalContainer">
            <!-- Modal Header -->
            <div class="px-6 py-3 border-b border-slate-700 flex justify-between items-center bg-slate-800/80 shrink-0">
                <h3 id="modalTitle" class="text-lg font-bold text-slate-100">標題</h3>
                <button onclick="closeActiveModal()" class="text-slate-400 hover:text-white text-2xl font-semibold focus:outline-none">&times;</button>
            </div>
            <!-- Modal Body -->
            <div id="modalContent" class="p-6 flex-1 overflow-y-auto">
                <!-- 動態注入的視窗內容 -->
            </div>
        </div>
    </div>

    <!-- ==================== JavaScript 全邏輯 ==================== -->
    <script>
		lucide.createIcons();
		
		const supabaseUrl = 'https://horjhocrxlhcehsthspv.supabase.co';
		const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhvcmpob2NyeGxoY2Voc3Roc3B2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjMxMzgsImV4cCI6MjA5NzkzOTEzOH0.FeXNgxp3lJkEkgqE8XWF9McCgsVRRyPIahT8i0n9H4g';
		const db = supabase.createClient(supabaseUrl, supabaseKey);
		
        // --- 核心資料庫 (記憶體狀態) ---
        let state = {
            currentHome: "高雄家",
            filterCategory: "all",
            filterMode: "all", // "all", "room", "exact" (location), "box"
            filterValue: "", 
            searchQuery: "",
            openGroups: {}, // 紀錄收合/展開狀態 (包含 room 與 location)
            rooms: {},
            locations: [],
            boxes: [], // 容器資料表
            categories: [],
            items: []
        };

		async function loadDataFromSupabase() {
			try {
				// 讀取類別
				const { data:cat, error1 } = await db.from('StoreHouse_Categories').select('*');
				if (error1) throw error1;
				state.categories = cat || [];
                // 需求：將類別透過ID進行遞增排序
                state.categories.sort((a, b) => a.id - b.id);
		
				// 讀取房間 (包含存放位置)
				const { data:room, error2 } = await db.from('StoreHouse_Rooms').select('*');
				if (error2) throw error2;
				state.locations = room || [];

                // 讀取容器
                const { data:box, error4 } = await db.from('StoreHouse_Boxes').select('*');
                if (error4) throw error4;
                state.boxes = box || [];
		
				// 讀取物品
				const { data:item, error3 } = await db.from('StoreHouse_Items').select('*');
				if (error3) throw error3;
				state.items = item || [];
		
                // 整理房間資料
				const rooms = state.locations.reduce((acc, curr) => {
					if (!acc[curr.home]) {
						acc[curr.home] = [];
					}
					if (!acc[curr.home].includes(curr.room)) {
						acc[curr.home].push(curr.room);
					}
					return acc;
				}, {});
		
				state.rooms = rooms;
		
				renderAll(); 
			} catch (err) {
				console.error('載入資料失敗:', err);
			}
		}

        // --- 初始化載入 ---
        window.onload = function() {
			loadDataFromSupabase();
            updateClock();
            setInterval(updateClock, 1000);
        };

        // --- 全域渲染器 ---
        function renderAll() {
            renderSidebarLocations();
            renderCategoryDropdown();
            renderTable();
            renderStats();
        }

        // 統一的過濾器函式
        function filterItems(mode, value, event) {
            if(event) {
                event.stopPropagation();
                event.preventDefault(); 
            }
            state.filterMode = mode;
            state.filterValue = value;
            renderSidebarLocations();
            renderTable();
            
            // 手機版點擊過濾選項後自動隱藏側邊欄
            const sidebar = document.getElementById('sidebar');
            if (sidebar && !sidebar.classList.contains('-translate-x-full') && window.innerWidth < 840) {
                toggleSidebar();
            }
        }

        // --- 1. 左側存放位置樹狀導覽動態渲染 ---
        function renderSidebarLocations() {
            const sidebar = document.getElementById('sidebarLocationNav');
            sidebar.innerHTML = '';

            const allActive = state.filterMode === 'all';
            const allLi = document.createElement('li');
            allLi.innerHTML = `
                <button onclick="filterItems('all', null, event)" class="w-full text-left px-3 py-0.5 rounded-lg transition text-sm font-medium ${allActive ? 'bg-blue-600 text-white' : 'hover:bg-slate-700 text-slate-300'}">
                    顯示所有位置
                </button>
            `;
            sidebar.appendChild(allLi);

            const currentLocations = state.locations.filter(l => l.home === state.currentHome);
            const currentBoxes = state.boxes.filter(b => b.home === state.currentHome);

            const groups = {};
            currentLocations.forEach(loc => {
                const groupName = loc.room;
                if (!groups[groupName]) groups[groupName] = [];
                groups[groupName].push(loc);
            });

            for (const [groupName, locList] of Object.entries(groups)) {
                const roomLi = document.createElement('li');
                let locationsHtml = '';

                locList.forEach(loc => {
                    if(loc.name === 'null') return; // 不顯示未命名位置
                    
                    const fullLocStr = `${loc.room}：${loc.name}`;
                    const boxesInLoc = currentBoxes.filter(b => b.room === loc.room && b.location === loc.name);
                    
                    const isLocSelected = state.filterMode === 'exact' && state.filterValue === fullLocStr;
                    const locSummaryBaseClass = "cursor-pointer pl-2 pr-3 py-0.5 rounded-lg list-none flex justify-between items-center text-sm transition";
                    const locSummaryActiveStyle = isLocSelected ? "bg-slate-700/50 text-blue-400 font-bold" : "hover:bg-slate-700/50 text-slate-300";
                    
                    if(boxesInLoc.length > 0) {
                        const isLocOpen = state.openGroups[fullLocStr] === true;
                        let boxesHtml = boxesInLoc.map(box => {
                            const fullBoxStr = `${loc.room}：${loc.name}：${box.name}`;
                            const isBoxSelected = state.filterMode === 'box' && state.filterValue === fullBoxStr;
                            return `
                                <li>
                                    <button onclick="filterItems('box', '${fullBoxStr}', event)" class="w-full text-left block pl-2 pr-3 py-0.5 text-xs rounded transition ${isBoxSelected ? 'text-blue-400 font-semibold bg-slate-700/50' : 'text-slate-400 hover:text-white hover:bg-slate-700/30'}">
                                        📦 ${box.name}
                                    </button>
                                </li>
                            `;
                        }).join('');

                        locationsHtml += `
                            <li>
                                <details class="group/loc" ${isLocOpen ? 'open' : ''} ontoggle="updateGroupState('${fullLocStr}', this.open)">
                                    <summary class="${locSummaryBaseClass} ${locSummaryActiveStyle}">
                                        <span onclick="filterItems('exact', '${fullLocStr}', event)" class="flex-1 hover:text-blue-300 transition">📌 ${loc.name}</span>
                                        <span class="text-xs text-slate-500 transition-transform group-open/loc:rotate-180 px-3">▼</span>
                                    </summary>
                                    <ul class="pl-3 mt-1 space-y-1 border-l border-slate-700 ml-4">
                                        ${boxesHtml}
                                    </ul>
                                </details>
                            </li>
                        `;
                    } else {
                        locationsHtml += `
                            <li>
                                <button onclick="filterItems('exact', '${fullLocStr}', event)" class="w-full text-left block pl-2 pr-3 py-0.5 text-sm rounded transition ${isLocSelected ? 'text-blue-400 font-semibold bg-slate-700/50' : 'text-slate-300 hover:text-white hover:bg-slate-700/30'}">
                                    📌 ${loc.name}
                                </button>
                            </li>
                        `;
                    }
                });

                const isRoomSelected = state.filterMode === 'room' && state.filterValue === groupName;
                const summaryBaseClass = "cursor-pointer px-3 py-0.5 rounded-lg list-none flex justify-between items-center text-sm font-medium transition";
                const summaryActiveStyle = isRoomSelected ? "bg-slate-700/50 text-blue-400 font-bold" : "hover:bg-slate-700 text-slate-300";

                const isRoomOpen = state.openGroups[groupName] === true;

                roomLi.innerHTML = `
                    <details class="group" ${isRoomOpen ? 'open' : ''} ontoggle="updateGroupState('${groupName}', this.open)">
                        <summary class="${summaryBaseClass} ${summaryActiveStyle}">
                            <span onclick="filterItems('room', '${groupName}', event)" class="flex-1 hover:text-blue-300 transition">🏢 ${groupName}</span>
                            <span class="text-sm text-slate-500 transition-transform group-open:rotate-180 px-3">▼</span>
                        </summary>
                        <ul class="pl-3 mt-1 space-y-1 border-l border-slate-700 ml-4">
                            ${locationsHtml}
                        </ul>
                    </details>
                `;
                sidebar.appendChild(roomLi);
            }
        }

        // --- 2. 篩選類別下拉式選單動態渲染 ---
        function renderCategoryDropdown() {
            const dropdown = document.getElementById('categoryFilter');
            const currentValue = dropdown.value || 'all';
            dropdown.innerHTML = '<option value="all">所有類別</option>';
            
			state.categories.forEach(cat => {
				const opt = document.createElement('option');
				opt.value = cat.id; 
				opt.textContent = cat.cat_name; 
				dropdown.appendChild(opt);
			});
            dropdown.value = currentValue;
        }

        // --- 3. 狀態統計數據渲染 ---
        function renderStats() {
            const currentItems = state.items.filter(item => item.home === state.currentHome);
            const totalItems = currentItems.length;
            document.getElementById('totalItemsDisplay').innerHTML = `${totalItems} <span class="text-base font-normal text-slate-300">件</span>`;

            const today = new Date();
			today.setHours(0, 0, 0, 0);
			
            const limitDate = new Date();
            limitDate.setDate(today.getDate() + 10);

            const expiringCount1 = currentItems.filter(item => {
                if (!item.expiry) return false;
				
                const expDate = new Date(item.expiry);
				expDate.setHours(0, 0, 0, 0); // 也將目標日期設為 00:00:00
				
                return expDate >= today && expDate <= limitDate;
            }).length;
            document.getElementById('expiringDisplay').innerHTML = `${expiringCount1} <span class="text-base font-normal text-slate-300">件</span>`;

            //const lowStockCount = currentItems.filter(item => item.quantity <= 1).length;
			
            const expiringCount2 = currentItems.filter(item => {
                if (!item.expiry) return false;
				
                const expDate = new Date(item.expiry);
				expDate.setHours(0, 0, 0, 0); // 也將目標日期設為 00:00:00
				
                return expDate < today;
            }).length;
            document.getElementById('lowStockDisplay').innerHTML = `${expiringCount2} <span class="text-base font-normal text-slate-300">件</span>`;
        }

        // --- 4. 庫存表格資料渲染 (核心篩選引擎) ---
        function renderTable() {
            const tbody = document.getElementById('inventoryTableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';

            let filteredItems = state.items.filter(item => {
                if (item.home !== state.currentHome) return false;
                if (state.filterCategory !== 'all' && item.category !== state.filterCategory) return false;
                
                if (state.filterMode === 'room' && item.room !== state.filterValue) return false;
                if (state.filterMode === 'exact') {
                    const [fRoom, fLoc] = state.filterValue.split('：');
                    if (item.room !== fRoom || item.location !== fLoc) return false;
                }
                if (state.filterMode === 'box') {
                    const [fRoom, fLoc, fBox] = state.filterValue.split('：');
                    if (item.room !== fRoom || item.location !== fLoc || item.box !== fBox) return false;
                }
                
                if (state.searchQuery && !item.name.toLowerCase().includes(state.searchQuery.toLowerCase())) return false;
                return true;
            });

            const filterBadge = document.getElementById('activeFilterBadge');
            if (state.filterMode === 'all') {
                filterBadge.innerText = `所有位置`;
                filterBadge.classList.remove('hidden');
			} else if (state.filterMode === 'room') {
                filterBadge.innerText = `${state.filterValue}`;
                filterBadge.classList.remove('hidden');
            } else if (state.filterMode === 'exact') {
                filterBadge.innerText = `${state.filterValue}`;
                filterBadge.classList.remove('hidden');
            } else if (state.filterMode === 'box') {
                filterBadge.innerText = `${state.filterValue}`;
                filterBadge.classList.remove('hidden');
            } else {
                filterBadge.classList.add('hidden');
            }

            if (filteredItems.length === 0) {

        async function saveItem(event, itemId) {
            event.preventDefault();
            const name = document.getElementById('formItemName').value;
            const categorySelect = document.getElementById('formItemCategory');
            const category = categorySelect.options[categorySelect.selectedIndex].text; 
            const quantity = parseInt(document.getElementById('formItemQuantity').value, 10);
            const expiry = document.getElementById('formItemExpiry').value || null;
            const room = document.getElementById('formItemRoom').value;
            const locName = document.getElementById('formItemLocationName').value;
            const boxName = document.getElementById('formItemBoxName').value || '';
            const remark = document.getElementById('formItemRemark').value || '';
            
            if (!room || !locName) {
                alert("請確保已選擇存放位置");
                return;
            }

            if (itemId === null) {
                // 新增物品
                const newItem = {
                    id: Date.now(),
                    category, name, quantity, 
					home: state.currentHome, room, location: locName, box: boxName,
					expiry, remark
                };
                state.items.push(newItem);
                const { error } = await db.from('StoreHouse_Items').insert([newItem]);
				if (error) console.error("新增物品失敗:", error);
            } else {
                // 編輯更新
                const index = state.items.findIndex(i => i.id === itemId);
                if (index !== -1) {
                    state.items[index] = { ...state.items[index], name, category, room, location: locName, box: boxName, quantity, expiry, remark };
                    const { error } = await db.from('StoreHouse_Items').update({ name, category, room, location: locName, box: boxName, quantity, expiry, remark }).eq('id', itemId);
					if (error) console.error("更新物品失敗:", error);
                }
            }

            closeActiveModal();
            renderAll();
        }

        async function saveBatchItems(event) {
            event.preventDefault();
            const room = document.getElementById('batchItemRoom').value;
            const locName = document.getElementById('batchItemLocationName').value;
            const boxName = document.getElementById('batchItemBoxName').value || '';
            
            // 讀取批量新增指定的類別
            const categorySelect = document.getElementById('batchItemCategory');
            const category = categorySelect ? categorySelect.options[categorySelect.selectedIndex].text : '未分類';

            if (!room || !locName) {
                alert("請確保已選擇存放位置");
                return;
            }

            const rows = document.querySelectorAll('.batch-item-row');
            const newItems = [];
            let baseId = Date.now();

            rows.forEach(row => {
                const nameInput = row.querySelector('.batch-item-name');
                const qtyInput = row.querySelector('.batch-item-qty');
                const name = nameInput.value.trim();
                const quantity = parseInt(qtyInput.value, 10);

                if (name) {
                    newItems.push({
                        id: baseId++, // 利用遞增確保當前迴圈每筆 ID 獨立
                        category: category,
                        name: name,
                        quantity: quantity,
                        home: state.currentHome,
                        room: room,
                        location: locName,
                        box: boxName,
                        expiry: null, // 按需求：有效期限預設空白
                        remark: ''    // 按需求：備註預設空白
                    });
                }
            });

            if (newItems.length === 0) {
                alert("請至少完整填寫一項物品名稱！");
                return;
            }

            // 同步加入本地陣列
            state.items.push(...newItems);

            // 批量發送至 Supabase (支援傳入 Array)
            const { error } = await db.from('StoreHouse_Items').insert(newItems);
            if (error) {
                console.error("批量新增物品失敗:", error);
                alert("批量新增時發生錯誤，請檢查主控台資訊。");
            }

            closeActiveModal();
            renderAll();
        }

        async function addOrUpdateRoom() {
            const input = document.getElementById('newRoomInput');
            const val = input.value.trim();
            if (!val) return;
            
            const currentRooms = state.rooms[state.currentHome];

            if (editingRoomName) {
                const oldRoom = editingRoomName;
                if (val !== oldRoom && !currentRooms.includes(val)) {
                    const idx = currentRooms.indexOf(oldRoom);
                    if (idx > -1) currentRooms[idx] = val;

                    state.locations.forEach(loc => { 
                        if(loc.home === state.currentHome && loc.room === oldRoom) loc.room = val; 
                    });
                    state.boxes.forEach(box => { 
                        if(box.home === state.currentHome && box.room === oldRoom) box.room = val; 
                    });
                    state.items.forEach(item => {
                        if(item.home === state.currentHome && item.room === oldRoom) item.room = val;
                    });
					
					await updateRoomInSupabase(oldRoom, val, state.currentHome);
                }
            } else {
                if (currentRooms.includes(val)) { input.value = ''; return; }
                currentRooms.push(val);
				
				const newLocation = { id: Date.now(), home: state.currentHome, room: val, name: "null" };

        async function addOrUpdateLocation() {
            const room = document.getElementById('newLocRoomSelect').value;
            const name = document.getElementById('newLocInput').value.trim();
            const errDiv = document.getElementById('locModalError');

            if(errDiv) errDiv.classList.add('hidden');

            if (!room || room === "all" || !name) {
                if (errDiv) {
                    errDiv.innerText = "請選擇具體的樓層房間並輸入存放位置名稱！";
                    errDiv.classList.remove('hidden');
                }
                return;
            }
            
            if (editingLocGlobalIdx > -1) {
                const locObj = state.locations.find(l => l.id === editingLocGlobalIdx);
                const oldName = locObj.name;
                const oldRoom = locObj.room;
                
                const exists = state.locations.some(l => l.id !== editingLocGlobalIdx && l.home === state.currentHome && l.room === room && l.name === name);
                
                if (!exists) {
                    locObj.room = room;
                    locObj.name = name;
					
                    state.boxes.forEach(box => {
                        if (box.home === state.currentHome && box.room === oldRoom && box.location === oldName) {
                            box.room = room; box.location = name;
                        }
                    });

                    state.items.forEach(item => {
                        if (item.home === state.currentHome && item.room === oldRoom && item.location === oldName) {
                            item.room = room; item.location = name;
                        }
                    });

                    await updateLocationInSupabase(editingLocGlobalIdx, oldRoom, oldName, room, name, state.currentHome);
                }
            } else {
                const exists = state.locations.some(l => l.home === state.currentHome && l.room === room && l.name === name);
                if (exists) { 
                    document.getElementById('newLocInput').value = ''; 
                    if (errDiv) {
                        errDiv.innerText = "此位置已有相同存放位置！";
                        errDiv.classList.remove('hidden');
                    }
                    return; 
                }
                
                const newLoc = { id: Date.now(), home: state.currentHome, room, name };
                state.locations.push(newLoc);
                await addLocationToSupabase(newLoc);
            }
            renderAll();
            openManageLocationsModal(room); // 保留目前選擇的狀態
        }

            btn.classList.replace('hover:bg-blue-500', 'hover:bg-emerald-500');
        }

        async function addOrUpdateBox() {
            const room = document.getElementById('newBoxRoomSelect').value;
            const loc = document.getElementById('newBoxLocSelect').value;
            const name = document.getElementById('newBoxInput').value.trim();
            const errDiv = document.getElementById('boxModalError');

            if(errDiv) errDiv.classList.add('hidden');

            if (!room || room === "all" || !loc || loc === "all" || !name) {
                if (errDiv) {
                    errDiv.innerText = "請選擇具體的樓層房間與存放位置，並輸入容器名稱！";
                    errDiv.classList.remove('hidden');
                }
                return;
            }
            
            if (editingBoxGlobalIdx > -1) {
                const boxObj = state.boxes.find(b => b.id === editingBoxGlobalIdx);
                const oldName = boxObj.name;
                const oldRoom = boxObj.room;
                const oldLoc = boxObj.location;
                
                const exists = state.boxes.some(b => b.id !== editingBoxGlobalIdx && b.home === state.currentHome && b.room === room && b.location === loc && b.name === name);
                
                if (!exists) {
                    boxObj.room = room;
                    boxObj.location = loc;
                    boxObj.name = name;
					
                    state.items.forEach(item => {
                        if (item.home === state.currentHome && item.room === oldRoom && item.location === oldLoc && item.box === oldName) {
                            item.room = room; item.location = loc; item.box = name;
                        }
                    });

                    await updateBoxInSupabase(editingBoxGlobalIdx, oldRoom, oldLoc, oldName, room, loc, name, state.currentHome);
                }
            } else {
                const exists = state.boxes.some(b => b.home === state.currentHome && b.room === room && b.location === loc && b.name === name);
                if (exists) { 
                    document.getElementById('newBoxInput').value = ''; 
                    if (errDiv) {
                        errDiv.innerText = "此位置已有相同容器名稱！";
                        errDiv.classList.remove('hidden');
                    }
                    return; 
                }
                
                const newBox = { id: Date.now(), home: state.currentHome, room, location: loc, name };
                state.boxes.push(newBox);
                await addBoxToSupabase(newBox);
            }
            renderAll();
            openManageBoxesModal(room, loc);
        }

        function confirmDeleteBox(id) {
            const box = state.boxes.find(b => b.id === id);
            if (!box) return;
            const currentRoom = document.getElementById('newBoxRoomSelect') ? document.getElementById('newBoxRoomSelect').value : 'all';
            const currentLoc = document.getElementById('newBoxLocSelect') ? document.getElementById('newBoxLocSelect').value : 'all';

            const html = `
                <div class="space-y-4">
                    <p class="text-slate-300 text-sm leading-relaxed">
                        您確定要刪除容器「<span class="text-red-400 font-bold">${box.name}</span>」嗎？此操作將無法還原。
                    </p>
                    <div class="pt-4 border-t border-slate-700 flex justify-end space-x-3">
                        <button onclick="openManageBoxesModal('${currentRoom}', '${currentLoc}')" class="px-4 py-2 text-sm text-slate-300 hover:bg-slate-700 rounded-lg transition">取消</button>
                        <button onclick="executeDeleteBox(${id}, '${currentRoom}', '${currentLoc}')" class="px-4 py-2 text-sm bg-red-600 hover:bg-red-500 text-white rounded-lg transition">確認刪除</button>
                    </div>
                </div>
            `;
            openModal("⚠️ 確認刪除容器", html);
        }

        async function executeDeleteBox(id, returnRoom, returnLoc) {
            state.boxes = state.boxes.filter(b => b.id !== id);
            await deleteBoxFromSupabase(id);
            renderAll();
            openManageBoxesModal(returnRoom, returnLoc);
        }

		async function addBoxToSupabase(newItem) {
			const { error } = await db.from('StoreHouse_Boxes').insert([newItem]); 
			if (error) console.error("新增容器失敗:", error);
		}
		
		async function deleteBoxFromSupabase(id) {
			const { error } = await db.from('StoreHouse_Boxes').delete().eq('id', id); 
			if (error) console.error("刪除容器失敗:", error);
		}
		
		async function updateBoxInSupabase(id, oldRoom, oldLoc, oldName, newRoom, newLoc, newName, home) {
			const { error1 } = await db.from('StoreHouse_Boxes').update({ room: newRoom, location: newLoc, name: newName }).eq('id', id);
            const { error2 } = await db.from('StoreHouse_Items').update({ room: newRoom, location: newLoc, box: newName }).eq('home', home).eq('room', oldRoom).eq('location', oldLoc).eq('box', oldName);
			if (error1 || error2) console.error("更新容器與連動失敗:", error1, error2);
		}


        // ==========================================
        // 功能 C: 自訂物品類別
        // ==========================================
        let editingCatIdx = -1;

        function openManageCategoriesModal() {
            editingCatIdx = -1;
			let listHtml = state.categories.map(cat => `
				<div class="flex justify-between items-center py-2 border-b border-slate-700 hover:bg-slate-800/50 px-2 rounded transition">
					<span class="text-sm font-medium text-slate-200">🏷️ ${cat.cat_name}</span>
					<div class="flex space-x-2">
						<button onclick="editCategory(${cat.id})" class="text-blue-400 hover:text-blue-300 truncate text-xs transition">編輯</button>
						<button onclick="confirmDeleteCategory(${cat.id})" class="text-red-400 hover:text-red-300 truncate text-xs transition">移除</button>
					</div>
				</div>
			`).join('');

            if (state.categories.length === 0) {
                listHtml = `<p class="text-slate-500 text-sm text-center py-4">目前無任何物品類別</p>`;
            }

            const html = `
                <div class="space-y-4">
                    <div class="flex gap-2">
                        <input type="text" id="newCatInput" placeholder="例如：清潔洗劑" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 text-slate-200">
                        <button id="catSubmitBtn" onclick="addOrUpdateCategory()" class="bg-blue-600 hover:bg-blue-500 text-white text-sm px-4 rounded-lg transition">新增</button>
                    </div>
                    <div class="max-h-80 overflow-y-auto pr-2 overflow-x-hidden">
                        ${listHtml}
                    </div>
                    <div class="pt-4 border-t border-slate-700 flex justify-end">
                        <button onclick="closeActiveModal()" class="px-4 py-2 text-sm bg-slate-700 hover:bg-slate-600 rounded-lg transition text-slate-200">關閉</button>
                    </div>
                </div>
            `;
            openModal("🏷️ 自訂物品類別", html);
        }

        function editCategory(idx) {
            editingCatIdx = idx;
			const catToEdit = state.categories.find(c => c.id === idx);
			if (!catToEdit) return;

			document.getElementById('newCatInput').value = catToEdit.cat_name;
			const btn = document.getElementById('catSubmitBtn');
			btn.innerText = '儲存';
			btn.classList.replace('bg-blue-600', 'bg-emerald-600');
			btn.classList.replace('hover:bg-blue-500', 'hover:bg-emerald-500');
        }

        async function addOrUpdateCategory() {
            const input = document.getElementById('newCatInput');
            const val = input.value.trim();
            if (!val) return;
            
            if (editingCatIdx > -1) {
				const catToUpdate = state.categories.find(c => c.id === editingCatIdx);
				
				if (catToUpdate) {
					const oldName = catToUpdate.cat_name;
					const isDuplicate = state.categories.some(c => c.cat_name === val && c.id !== editingCatIdx);
					if (val !== oldName && !isDuplicate) {
						catToUpdate.cat_name = val;
						state.items.forEach(item => {
							if (item.category === oldName) item.category = val;
						});
						await updateCategoryInSupabase(editingCatIdx, oldName, val);
					}
				}
            } else {
				if (state.categories.some(c => c.cat_name === val)) {
					alert("這個類別名稱已經存在了！");
					input.value = ''; 
					return; 
				}
                const newCat = { id: Date.now(), cat_name: val };
				state.categories.push(newCat);
				await addCategorieToSupabase(newCat);
            }
            renderAll();
            openManageCategoriesModal();
        }

        function confirmDeleteCategory(id) {
            const cat = state.categories.find(c => c.id === id);
            if (!cat) return;

            const html = `
                <div class="space-y-4">
                    <p class="text-slate-300 text-sm leading-relaxed">
                        您確定要刪除物品類別「<span class="text-red-400 font-bold">${cat.cat_name}</span>」嗎？此操作將無法還原。
                    </p>
                    <div class="pt-4 border-t border-slate-700 flex justify-end space-x-3">
                        <button onclick="openManageCategoriesModal()" class="px-4 py-2 text-sm text-slate-300 hover:bg-slate-700 rounded-lg transition">取消</button>
                        <button onclick="executeDeleteCategory(${id})" class="px-4 py-2 text-sm bg-red-600 hover:bg-red-500 text-white rounded-lg transition">確認刪除</button>
                    </div>
                </div>
            `;
            openModal("⚠️ 確認刪除物品類別", html);
        }

        async function executeDeleteCategory(idx) {
			state.categories = state.categories.filter(c => c.id !== idx);
			await deleteCategorieFromSupabase(idx)
            renderAll();
            openManageCategoriesModal();
        }
		
		async function addCategorieToSupabase(newItem) {
			const { error } = await db.from('StoreHouse_Categories').insert([newItem]); 
			if (error) console.error("新增類別失敗:", error);
		}
		
		async function deleteCategorieFromSupabase(itemId) {
			const { error } = await db.from('StoreHouse_Categories').delete().eq('id', itemId); 
			if (error) console.error("刪除類別失敗:", error);
		}
		
		async function updateCategoryInSupabase(id, oldName, newName) {
			const { error1 } = await db.from('StoreHouse_Categories').update({ cat_name: newName }).eq('id', id);
			const { error2 } = await db.from('StoreHouse_Items').update({ category: newName }).eq('category', oldName);
			if (error1 || error2) console.error("更新類別名稱及物品連動失敗:", error1, error2);
		}

        // --- 功能 D: 刪除物品確認 Modal ---
        function confirmDeleteItem(itemId) {
            const item = state.items.find(i => i.id === itemId);
            if (!item) return;

            const html = `
                <div class="space-y-4">
                    <p class="text-slate-300 text-sm leading-relaxed">
                        您確定要刪除物資「<span class="text-red-400 font-bold">${item.name}</span>」嗎？此操作將無法還原。
                    </p>
                    <div class="pt-4 border-t border-slate-700 flex justify-end space-x-3">
                        <button onclick="closeActiveModal()" class="px-4 py-2 text-sm text-slate-300 hover:bg-slate-700 rounded-lg transition">取消</button>
                        <button onclick="executeDeleteItem(${itemId})" class="px-4 py-2 text-sm bg-red-600 hover:bg-red-500 text-white rounded-lg transition">確認刪除</button>
                    </div>
                </div>
            `;
            openModal("⚠️ 確認刪除物資", html);
        }

        async function executeDeleteItem(itemId) {
            state.items = state.items.filter(i => i.id !== itemId);
            await db.from('StoreHouse_Items').delete().eq('id', itemId);
            closeActiveModal();
            renderAll();
        }

        // --- 功能 E: 編輯物品備註 Modal ---
        function openRemarkModal(itemId) {
            const item = state.items.find(i => i.id === itemId);
            if (!item) return;

            const html = `
                <form id="remarkForm" onsubmit="saveOnlyRemark(event, ${itemId})" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">「${item.name}」的備註資訊</label>
                        <textarea id="modalOnlyRemark" rows="6" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500 text-slate-200 placeholder-slate-500" style="height: 200px;" placeholder="在此輸入多行備註...">${item.remark || ''}</textarea>
                    </div>
                    <div class="pt-4 border-t border-slate-700 flex justify-end space-x-3">
                        <button type="button" onclick="closeActiveModal()" class="px-4 py-2 text-sm text-slate-300 hover:bg-slate-700 rounded-lg transition">取消</button>
                        <button type="submit" class="px-4 py-2 text-sm bg-green-600 hover:bg-green-500 text-white rounded-lg transition shadow-md shadow-green-900/30">儲存備註</button>
                    </div>
                </form>
            `;
            openModal("📝 物品備註", html);
        }

        async function saveOnlyRemark(event, itemId) {
            event.preventDefault();
            const remark = document.getElementById('modalOnlyRemark').value;
            
            const index = state.items.findIndex(i => i.id === itemId);
            if (index !== -1) {
                state.items[index].remark = remark;
                const { error } = await db.from('StoreHouse_Items').update({ remark }).eq('id', itemId);
                if (error) console.error("更新備註失敗:", error);
            }
            
            closeActiveModal();
            renderTable(); 
        }

        // --- 功能 F: 顯示到期/過期物品清單 Modal ---
        function showExpiringItems() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const limitDate = new Date();
            limitDate.setDate(today.getDate() + 10);

            const currentItems = state.items.filter(item => item.home === state.currentHome);
            const expiringItems = currentItems.filter(item => {
                if (!item.expiry) return false;
                const expDate = new Date(item.expiry);
                expDate.setHours(0, 0, 0, 0);
                return expDate >= today && expDate <= limitDate;
            });

            // 以日期遞增排序 (越快到期越前面)
            expiringItems.sort((a, b) => new Date(a.expiry) - new Date(b.expiry));

            renderExpiryListModal("⚠️ 即將到期清單 (10天內)", expiringItems, "orange");
        }

        function showExpiredItems() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const currentItems = state.items.filter(item => item.home === state.currentHome);
            const expiredItems = currentItems.filter(item => {
                if (!item.expiry) return false;
                const expDate = new Date(item.expiry);
                expDate.setHours(0, 0, 0, 0);
                return expDate < today;
            });

            // 以日期遞增排序 (過期越久越前面)
            expiredItems.sort((a, b) => new Date(a.expiry) - new Date(b.expiry));

            renderExpiryListModal("🚨 已過期清單", expiredItems, "red");
        }

        function renderExpiryListModal(title, items, colorMode) {
            let listHtml = '';
            if (items.length === 0) {
                listHtml = `<p class="text-slate-500 text-sm text-center py-6">目前無符合的物品</p>`;
            } else {
                listHtml = items.map(item => {
                    const colorClass = colorMode === 'red' ? 'text-red-400' : 'text-orange-400';
                    return `
                    <div class="flex justify-between items-center py-1 border-b border-slate-700 hover:bg-slate-800/50 px-2 rounded transition">
                        <div>
                            <div class="text-sm font-medium text-slate-200">${item.name}</div>
                            <div class="text-xs text-slate-400 mt-1">📌 ${item.room}：${item.location} ${item.box ? `📦 ${item.box}` : ''}</div>
                        </div>
                        <div class="text-right flex flex-col justify-center">
                            <div class="text-sm font-bold ${colorClass}">${item.expiry}</div>
                            <div class="text-xs text-slate-400 mt-1">數量：${item.quantity}</div>
                        </div>
                    </div>
                    `;
                }).join('');
            }

            const html = `
                <div class="space-y-2">
                    <div class="max-h-[60vh] overflow-y-auto pr-2 overflow-x-hidden">
                        ${listHtml}
                    </div>
                    <div class="pt-4 border-t border-slate-700 flex justify-end">
                        <button onclick="closeActiveModal()" class="px-4 py-2 text-sm bg-slate-700 hover:bg-slate-600 rounded-lg transition text-slate-200">關閉</button>
                    </div>
                </div>
            `;
            openModal(title, html);
        }
    </script>
</body>
