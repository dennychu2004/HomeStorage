<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>居家倉儲紀錄系統</title>
	
    <script src="https://cdn.tailwindcss.com"></script>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        /* 隱藏 details 的預設標記 (針對 Safari/Chrome) */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
	
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 font-sans select-none">
    
    <!-- 側邊欄遮罩 (手機版) -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-30 hidden min-[840px]:hidden"></div>

    <div class="flex h-screen overflow-hidden">

        <!-- 左側導覽列 -->
        <aside id="sidebar" class="w-64 bg-slate-800 border-r border-slate-700 flex-shrink-0 flex flex-col fixed inset-y-0 left-0 z-40 transform -translate-x-full min-[840px]:relative min-[840px]:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="p-3">
                <h1 class="text-xl font-bold text-blue-400 mb-6">🏠 朱家倉儲</h1>
                
                <div class="mb-6">
                    <label class="text-xs text-slate-500 mb-2 block">切換住家</label>
                    <select id="homeSelect" onchange="switchHome()" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 text-slate-200">
                        <option value="高雄家">高雄家</option>
                        <option value="台南宿舍">台南宿舍</option>
                    </select>
                </div>
            </div>
            
            <nav class="flex-1 overflow-y-auto px-3 space-y-6">
                <div>
                    <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">位置導覽</h3>
                    <ul class="space-y-2" id="sidebarLocationNav">
                        <!-- 由 JavaScript 動態生成位置導覽 -->
                    </ul>
                </div>

                <div>
                    <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">系統設定</h3>
                    <button onclick="openManageRoomsModal()" class="w-full text-left block px-3 py-1 rounded-lg hover:bg-slate-700 transition mb-1 text-slate-300 text-sm">自訂樓層房間</button>
                    <button onclick="openManageLocationsModal()" class="w-full text-left block px-3 py-1 rounded-lg hover:bg-slate-700 transition mb-1 text-slate-300 text-sm">自訂存放位置</button>
                    <button onclick="openManageCategoriesModal()" class="w-full text-left block px-3 py-1 rounded-lg hover:bg-slate-700 transition text-slate-300 text-sm">自訂物品類別</button>
                </div>
            </nav>
        </aside>

        <!-- 右側主內容 -->
        <main class="flex-1 overflow-y-auto flex flex-col">
            <!-- 頂部導覽列 -->
            <header class="bg-slate-800/50 backdrop-blur-md sticky top-0 z-10 border-b border-slate-700">
                <div class="px-4 min-[840px]:px-8 py-3 flex justify-between items-center">
                    <div class="flex items-center">
                        <button onclick="toggleSidebar()" class="min-[840px]:hidden mr-3 text-slate-300 hover:text-white focus:outline-none">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                            </svg>
                        </button>
                        <div id="currentHomeDisplay" class="text-lg font-medium text-slate-200">
                            目前住家：高雄家
                        </div>
                    </div>
                    <div id="clock" class="text-sm text-slate-400 font-mono hidden sm:block"></div>
                </div>
            </header>

            <div class="p-3 flex-1">
                <!-- 狀態摘要 -->
                <section class="grid grid-cols-1 min-[840px]:grid-cols-3 gap-3 mb-4">
                    <div class="bg-slate-800 py-1 px-3 rounded-2xl border border-slate-700 shadow-lg">
                        <p class="text-slate-400 text-sm">總庫存品項</p>
                        <h2 id="totalItemsDisplay" class="text-3xl font-bold mt-1 text-blue-400">0 <span class="text-base font-normal text-slate-300">件</span></h2>
                    </div>
                    <div class="bg-slate-800 py-1 px-3 rounded-2xl border border-slate-700 shadow-lg">
                        <p class="text-slate-400 text-sm">即將到期 (30天內)</p>
                        <h2 id="expiringDisplay" class="text-3xl font-bold text-orange-400 mt-1">0 <span class="text-base font-normal text-slate-300">件</span></h2>
                    </div>
                    <div class="bg-slate-800 py-1 px-3 rounded-2xl border border-slate-700 shadow-lg">
                        <p class="text-slate-400 text-sm">低庫存警示</p>
                        <h2 id="lowStockDisplay" class="text-3xl font-bold text-red-400 mt-1">0 <span class="text-base font-normal text-slate-300">件</span></h2>
                    </div>
                </section>

                <!-- 搜尋與類別篩選 -->
                <section class="flex flex-col min-[840px]:flex-row gap-3 mb-4">
                    <div class="flex-1 relative">
                        <input id="searchInput" type="text" oninput="triggerFilter()" placeholder="搜尋物品名稱..." 
                            class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 text-slate-100 placeholder-slate-500">
                    </div>
                    <select id="categoryFilter" onchange="triggerFilter()" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none text-slate-200">
                        <option value="all">所有類別</option>
                        <!-- 動態載入類別 -->
                    </select>
                </section>

                <!-- 庫存明細列表 -->
                <section class="bg-slate-800 py-1 px-3 rounded-2xl border border-slate-700 shadow-lg">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-bold flex items-center">
                            庫存明細
                            <span id="activeFilterBadge" class="ml-3 px-2.5 py-0.5 rounded-full text-sm font-semibold bg-blue-900/50 text-blue-300 hidden"></span>
                        </h3>
                        <button onclick="openAddEditItemModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg transition text-sm font-medium shadow-md shadow-blue-900/30">+ 新增物品</button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-slate-400 border-b border-slate-700">
                                <tr>
                                    <th class="pb-2 font-normal text-sm">名稱</th>
                                    <th class="pb-2 font-normal text-sm">類別</th>
                                    <th class="pb-2 font-normal text-sm">位置</th>
                                    <th class="pb-2 font-normal text-sm">數量</th>
                                    <th class="pb-2 font-normal text-sm">日期</th>
                                    <th class="pb-2 font-normal text-sm text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryTableBody" class="divide-y divide-slate-700">
                                <!-- 庫存數據將動態渲染 -->
                            </tbody>
                        </table>
                        <div id="emptyState" class="py-12 text-center text-slate-500 hidden">
                            無符合當前篩選條件的物品。
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- ==================== 浮動視窗 (Modal) 系統 ==================== -->
    <div id="modalOverlay" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-3 hidden">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl max-w-lg w-full overflow-hidden shadow-2xl transition-all scale-95" id="modalContainer">
            <!-- Modal Header -->
            <div class="px-6 py-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/80">
                <h3 id="modalTitle" class="text-lg font-bold text-slate-100">標題</h3>
                <button onclick="closeActiveModal()" class="text-slate-400 hover:text-white text-2xl font-semibold focus:outline-none">&times;</button>
            </div>
            <!-- Modal Body -->
            <div id="modalContent" class="p-6 max-h-[75vh] overflow-y-auto">
                <!-- 動態注入的視窗內容 -->
            </div>
        </div>
    </div>

    <!-- ==================== JavaScript 全邏輯 ==================== -->
    <script>
		const supabaseUrl = 'https://horjhocrxlhcehsthspv.supabase.co';
		const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhvcmpob2NyeGxoY2Voc3Roc3B2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjMxMzgsImV4cCI6MjA5NzkzOTEzOH0.FeXNgxp3lJkEkgqE8XWF9McCgsVRRyPIahT8i0n9H4g';
		const db = supabase.createClient(supabaseUrl, supabaseKey);
		
        // --- 核心資料庫 (記憶體狀態) ---
        let state = {
            currentHome: "高雄家",
            filterCategory: "all",
            filterMode: "all",
            filterValue: "", 
            searchQuery: "",
            openGroups: {}, // 紀錄收合/展開狀態
            rooms: {},
            locations: [],
            categories: [],
            items: []
        };

		async function loadDataFromSupabase() {
			try {
				// 讀取類別
				const { data:cat, error1 } = await db.from('StoreHouse_Categories').select('*');
				if (error1) throw error1;
				state.categories = cat || [];
		
				// 讀取房間 (包含存放位置)
				const { data:room, error2 } = await db.from('StoreHouse_Rooms').select('*');
				if (error2) throw error2;
				state.locations = room || [];
		
				// 讀取物品
				const { data:item, error3 } = await db.from('StoreHouse_Items').select('*');
				if (error3) throw error3;
				state.items = item || [];
		
                // 整理房間資料
				const rooms = state.locations.reduce((acc, curr) => {
					if (!acc[curr.home]) {
						acc[curr.home] = [];
					}
					if (!acc[curr.home].includes(curr.room)) {
						acc[curr.home].push(curr.room);
					}
					return acc;
				}, {});
		
				state.rooms = rooms;
		
				renderAll(); 
			} catch (err) {
				console.error('載入資料失敗:', err);
			}
		}

        // --- 初始化載入 ---
        window.onload = function() {
			loadDataFromSupabase();
            updateClock();
            setInterval(updateClock, 1000);
        };

        // --- 全域渲染器 ---
        function renderAll() {
            renderSidebarLocations();
            renderCategoryDropdown();
            renderTable();
            renderStats();
        }

        // 統一的過濾器函式
        function filterItems(mode, value, event) {
            if(event) {
                event.stopPropagation();
                event.preventDefault(); 
            }
            state.filterMode = mode;
            state.filterValue = value;
            renderSidebarLocations();
            renderTable();
            
            // 手機版點擊過濾選項後自動隱藏側邊欄
            const sidebar = document.getElementById('sidebar');
            if (sidebar && !sidebar.classList.contains('-translate-x-full') && window.innerWidth < 768) {
                toggleSidebar();
            }
        }

        // --- 1. 左側存放位置樹狀導覽動態渲染 ---
        function renderSidebarLocations() {
            const sidebar = document.getElementById('sidebarLocationNav');
            sidebar.innerHTML = '';

            const allActive = state.filterMode === 'all';
            const allLi = document.createElement('li');
            allLi.innerHTML = `
                <button onclick="filterItems('all', null, event)" class="w-full text-left px-4 py-1 rounded-lg transition text-sm font-medium ${allActive ? 'bg-blue-600 text-white' : 'hover:bg-slate-700 text-slate-300'}">
                    顯示所有位置
                </button>
            `;
            sidebar.appendChild(allLi);

            const currentLocations = state.locations.filter(l => l.home === state.currentHome);
            const groups = {};
            currentLocations.forEach(loc => {
                const groupName = loc.room;
                if (!groups[groupName]) groups[groupName] = [];
                groups[groupName].push(loc);
            });

            for (const [groupName, locList] of Object.entries(groups)) {
                const detailsLi = document.createElement('li');
                let subItemsHtml = '';
                locList.forEach(loc => {
                    if(loc.name === 'null') return; // 不顯示未命名位置
                    const fullLocStr = `${loc.room}：${loc.name}`;
                    const isSelected = state.filterMode === 'exact' && state.filterValue === fullLocStr;
                    subItemsHtml += `
                        <li>
                            <button onclick="filterItems('exact', '${fullLocStr}', event)" class="w-full text-left block px-4 py-0.5 text-sm rounded transition ${isSelected ? 'text-blue-400 font-semibold bg-slate-700/50' : 'text-slate-400 hover:text-white hover:bg-slate-700/30'}">
                                📍 ${loc.name}
                            </button>
                        </li>
                    `;
                });

                const isRoomSelected = state.filterMode === 'room' && state.filterValue === groupName;
                const summaryBaseClass = "cursor-pointer px-4 py-1 rounded-lg list-none flex justify-between items-center text-sm font-medium transition";
                const summaryActiveStyle = isRoomSelected ? "bg-slate-700/50 text-blue-400 font-bold" : "hover:bg-slate-700 text-slate-300";

                const isOpen = state.openGroups[groupName] === true;

                detailsLi.innerHTML = `
                    <details class="group" ${isOpen ? 'open' : ''} ontoggle="updateGroupState('${groupName}', this.open)">
                        <summary class="${summaryBaseClass} ${summaryActiveStyle}">
                            <span onclick="filterItems('room', '${groupName}', event)" class="flex-1 hover:text-blue-300 transition">🏢 ${groupName}</span>
                            <span class="text-sm text-slate-500 transition-transform group-open:rotate-180 px-2">▼</span>
                        </summary>
                        <ul class="pl-4 mt-1 space-y-1 border-l border-slate-700 ml-4">
                            ${subItemsHtml}
                        </ul>
                    </details>
                `;
                sidebar.appendChild(detailsLi);
            }
        }

        // --- 2. 篩選類別下拉式選單動態渲染 ---
        function renderCategoryDropdown() {
            const dropdown = document.getElementById('categoryFilter');
            const currentValue = dropdown.value || 'all';
            dropdown.innerHTML = '<option value="all">所有類別</option>';
            
			state.categories.forEach(cat => {
				const opt = document.createElement('option');
				opt.value = cat.id; 
				opt.textContent = cat.cat_name; 
				dropdown.appendChild(opt);
			});
            dropdown.value = currentValue;
        }

        // --- 3. 狀態統計數據渲染 ---
        function renderStats() {
            const currentItems = state.items.filter(item => item.home === state.currentHome);
            const totalItems = currentItems.length;
            document.getElementById('totalItemsDisplay').innerHTML = `${totalItems} <span class="text-base font-normal text-slate-300">件</span>`;

            const today = new Date();
            const limitDate = new Date();
            limitDate.setDate(today.getDate() + 30);

            const expiringCount = currentItems.filter(item => {
                if (!item.expiry) return false;
                const expDate = new Date(item.expiry);
                return expDate >= today && expDate <= limitDate;
            }).length;
            document.getElementById('expiringDisplay').innerHTML = `${expiringCount} <span class="text-base font-normal text-slate-300">件</span>`;

            const lowStockCount = currentItems.filter(item => item.quantity <= 1).length;
            document.getElementById('lowStockDisplay').innerHTML = `${lowStockCount} <span class="text-base font-normal text-slate-300">件</span>`;
        }

        // --- 4. 庫存表格資料渲染 (核心篩選引擎) ---
        function renderTable() {
            const tbody = document.getElementById('inventoryTableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';

            let filteredItems = state.items.filter(item => {
                if (item.home !== state.currentHome) return false;
                if (state.filterCategory !== 'all' && item.category !== state.filterCategory) return false;
                if (state.filterMode === 'room' && item.room !== state.filterValue) return false;
                if (state.filterMode === 'exact') {
                    const [fRoom, fLoc] = state.filterValue.split('：');
                    if (item.room !== fRoom || item.location !== fLoc) return false;
                }
                if (state.searchQuery && !item.name.toLowerCase().includes(state.searchQuery.toLowerCase())) return false;
                return true;
            });

            const filterBadge = document.getElementById('activeFilterBadge');
            if (state.filterMode === 'all') {
                filterBadge.innerText = `所有位置`;
                filterBadge.classList.remove('hidden');
			} else if (state.filterMode === 'room') {
                filterBadge.innerText = `${state.filterValue}`;
                filterBadge.classList.remove('hidden');
            } else if (state.filterMode === 'exact') {
                filterBadge.innerText = `${state.filterValue}`;
                filterBadge.classList.remove('hidden');
            } else {
                filterBadge.classList.add('hidden');
            }

            if (filteredItems.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            filteredItems.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-800/40 transition-colors";
                
                let qtyDisplay = `${item.quantity}`;
                let qtyClass = "text-slate-100 text-sm";
                if (item.quantity === 0) {
                    qtyDisplay = `0`;
                    qtyClass = "text-red-400 font-bold text-sm";
                } else if (item.quantity === 1) {
                    qtyDisplay = `1`;
                    qtyClass = "text-orange-400 font-semibold text-sm";
                }

                let expiryDisplay = item.expiry || '-';
                let expiryClass = "text-slate-300";
                if (item.expiry) {
                    const today = new Date();
                    const expDate = new Date(item.expiry);
                    const daysLeft = Math.ceil((expDate - today) / (1000 * 60 * 60 * 24));
                    if (daysLeft < 0) {
                        expiryDisplay = `${item.expiry}`;
                        expiryClass = "text-red-500 font-semibold text-sm";
                    } else if (daysLeft <= 30) {
                        expiryDisplay = `${item.expiry}`;
                        expiryClass = "text-orange-400 font-semibold text-sm";
                    } else {
                        expiryClass = "text-emerald-400 text-sm";
                    }
                }

                tr.innerHTML = `
                    <td class="py-1 font-medium text-slate-100 text-sm">${item.name}</td>
                    <td class="py-1 text-slate-400 text-sm">${item.category}</td>
                    <td class="py-1 text-slate-400 text-sm">${item.room}：${item.location}</td>
                    <td class="py-1 ${qtyClass}">${qtyDisplay}</td>
                    <td class="py-1 ${expiryClass}">${expiryDisplay}</td>
                    <td class="py-1 text-right flex justify-end space-x-3">
                        <button onclick="openAddEditItemModal(${item.id})" class="text-slate-400 hover:text-blue-400 p-1 rounded hover:bg-slate-700/50 transition" title="編輯">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                        </button>
                        <button onclick="confirmDeleteItem(${item.id})" class="text-slate-400 hover:text-red-400 p-1 rounded hover:bg-slate-700/50 transition" title="刪除">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- 5. 住家切換功能 ---
        function switchHome() {
            const select = document.getElementById('homeSelect');
            const display = document.getElementById('currentHomeDisplay');
            state.currentHome = select.value;
            display.innerText = `目前住家：${state.currentHome}`;
            
            state.filterMode = 'all';
            state.filterValue = '';
            
            renderAll();
            
            // 手機版切換住家後自動隱藏側邊欄
            const sidebar = document.getElementById('sidebar');
            if (sidebar && !sidebar.classList.contains('-translate-x-full') && window.innerWidth < 768) {
                toggleSidebar();
            }
        }

        // --- 6. 事件過濾觸發器 ---
        function triggerFilter() {
            state.searchQuery = document.getElementById('searchInput').value;
			const select = document.getElementById('categoryFilter');
			const selectedText = select.options[select.selectedIndex].text;
			state.filterCategory = (select.value === 'all') ? 'all' : selectedText;
            renderTable();
        }

        // 手機版側邊欄開關
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // 更新群組展開/收縮狀態
        window.updateGroupState = function(groupName, isOpen) {
            state.openGroups[groupName] = isOpen;
        };

        // --- 7. 時間時鐘更新 ---
        function updateClock() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('clock').innerText = `${dateStr} ${timeStr}`;
        }

        // ==================== 自訂彈出視窗 UI 互動引擎 ====================
        function openModal(title, contentHtml) {
            const overlay = document.getElementById('modalOverlay');
            const titleEl = document.getElementById('modalTitle');
            const contentEl = document.getElementById('modalContent');
            titleEl.innerText = title;
            contentEl.innerHTML = contentHtml;
            overlay.classList.remove('hidden');
        }

        function closeActiveModal() {
            const overlay = document.getElementById('modalOverlay');
            const container = document.getElementById('modalContainer');
            container.classList.remove('scale-100');
            container.classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); }, 150);
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") closeActiveModal();
        });

        // --- 功能 A: 新增 / 編輯物品 Modal ---
        window.updateModalLocationOptions = function() {
            const selectedRoom = document.getElementById('formItemRoom').value;
            const locSelect = document.getElementById('formItemLocationName');
            const validLocs = state.locations.filter(l => l.home === state.currentHome && l.room === selectedRoom && l.name !== 'null');
            
            if (validLocs.length > 0) {
                locSelect.innerHTML = validLocs.map(l => `<option value="${l.name}">${l.name}</option>`).join('');

        async function saveItem(event, itemId) {
            event.preventDefault();
            const name = document.getElementById('formItemName').value;
            const categorySelect = document.getElementById('formItemCategory');
            const category = categorySelect.options[categorySelect.selectedIndex].text; // 取得中文名稱
            const quantity = parseInt(document.getElementById('formItemQuantity').value, 10);
            const expiry = document.getElementById('formItemExpiry').value;
            const room = document.getElementById('formItemRoom').value;
            const locName = document.getElementById('formItemLocationName').value;
            
            if (!room || !locName) {
                alert("請確保已選擇存放位置");
                return;
            }

            if (itemId === null) {
                // 新增物品
                const newItem = {
                    id: Date.now(),
                    category, name, quantity, 
					home: state.currentHome, room, location: locName, 
					expiry
                };
				if(newItem.expiry == "")
				{
					newItem.expiry = null;
				}
                state.items.push(newItem);
                // 寫入 Supabase
                const { error } = await db.from('StoreHouse_Items').insert([newItem]);
				if (error) console.error("新增物品失敗:", error);
            } else {
                // 編輯更新
                const index = state.items.findIndex(i => i.id === itemId);
                if (index !== -1) {
                    state.items[index] = { ...state.items[index], name, category, room, location: locName, quantity, expiry };
                    // 寫入 Supabase
                    const { error } = await db.from('StoreHouse_Items').update({ name, category, room, location: locName, quantity, expiry }).eq('id', itemId);
					if (error) console.error("新增物品失敗:", error);
                }
            }

            closeActiveModal();
            renderAll();
        }

        async function addOrUpdateRoom() {
            const input = document.getElementById('newRoomInput');
            const val = input.value.trim();
            if (!val) return;
            
            const currentRooms = state.rooms[state.currentHome];

            if (editingRoomName) {
                const oldRoom = editingRoomName;
                if (val !== oldRoom && !currentRooms.includes(val)) {
                    // 更新本地 Rooms 清單
                    const idx = currentRooms.indexOf(oldRoom);
                    if (idx > -1) currentRooms[idx] = val;

                    // 全域連動更新：更新 Locations
                    state.locations.forEach(loc => { 
                        if(loc.home === state.currentHome && loc.room === oldRoom) {
                            loc.room = val; 
                        }
                    });

                    // 全域連動更新：更新 Items
                    state.items.forEach(item => {
                        if(item.home === state.currentHome && item.room === oldRoom) {
                            item.room = val;
                        }
                    });
					
                    // 寫入 Supabase (連動更新 StoreHouse_Rooms 與 StoreHouse_Items)
					await updateRoomInSupabase(oldRoom, val, state.currentHome);
                }
            } else {
                if (currentRooms.includes(val)) { input.value = ''; return; }
                currentRooms.push(val);
				
				const newLocation = { 
					id: Date.now(), 
					home: state.currentHome, 
					room: val,
					name: "null" 
				};
				state.locations.push(newLocation);
				
                // 寫入 Supabase
				await addRoomToSupabase(newLocation);
            }
            renderAll();
            openManageRoomsModal();
        }

            // 刪除相關的 locations
			state.locations = state.locations.filter(l => !(l.home === state.currentHome && l.room === roomName));
			
			// 刪除 Supabase 中此住家的該房間記錄
			await deleteRoomFromSupabase(roomName, state.currentHome);
			
            renderAll();
            openManageRoomsModal();
        }

                    <p class="text-slate-300 text-sm leading-relaxed">
                        您確定要刪除物資「<span class="text-red-400 font-bold">${item.name}</span>」嗎？此操作將無法還原。
                    </p>
                    <div class="pt-4 border-t border-slate-700 flex justify-end space-x-3">
                        <button onclick="closeActiveModal()" class="px-4 py-2 text-sm text-slate-300 hover:bg-slate-700 rounded-lg transition">取消</button>
                        <button onclick="executeDeleteItem(${itemId})" class="px-4 py-2 text-sm bg-red-600 hover:bg-red-500 text-white rounded-lg transition">確認刪除</button>
                    </div>
                </div>
            `;
            openModal("⚠️ 確認刪除物資", html);
        }

        async function executeDeleteItem(itemId) {
            state.items = state.items.filter(i => i.id !== itemId);
            // 寫入 Supabase (從資料庫刪除物品)
            await db.from('StoreHouse_Items').delete().eq('id', itemId);
            closeActiveModal();
            renderAll();
        }
    </script>
</body>
</html>
